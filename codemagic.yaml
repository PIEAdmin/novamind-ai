workflows:
  novamind-android:
    name: NovaMind AI Android
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      groups:
        - novamind_keys
      node: 20.11.0
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: npm ci || npm install
      - name: Build web app
        script: npm run build
      - name: Add Android platform
        script: npx cap add android || true
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Build Android AAB
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true

  novamind-ios:
    name: NovaMind AI iOS
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - novamind_keys
        - appstore_credentials
      node: 20.11.0
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: studio.novamindai.app
        TEAM_ID: TD66PZ2GJG
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: npm ci || npm install
      - name: Build web app
        script: npm run build
      - name: Add iOS platform
        script: npx cap add ios || true
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates

          # Extract provisioning profile name (use-profiles fails silently on Capacitor)
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          for f in "$PROFILES_HOME"/*.mobileprovision; do
            PLIST=$(/usr/bin/security cms -D -i "$f" 2>/dev/null)
            PNAME=$(/usr/libexec/PlistBuddy -c "Print Name" /dev/stdin <<< "$PLIST" 2>/dev/null)
            PUUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$PLIST" 2>/dev/null)
            if [ ! -z "$PNAME" ]; then
              echo "Found profile: $PNAME ($PUUID)"
              echo "CM_PROVISIONING_PROFILE=$PNAME" >> $CM_ENV
              break
            fi
          done
      - name: Build iOS IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace App.xcworkspace \
            --scheme App \
            --archive-flags="DEVELOPMENT_TEAM=$TEAM_ID PROVISIONING_PROFILE_SPECIFIER='$CM_PROVISIONING_PROFILE' CODE_SIGN_IDENTITY='iPhone Distribution'"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - ios/App/build/ios/ipa/*.ipa
      - "**/*.ipa"
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
