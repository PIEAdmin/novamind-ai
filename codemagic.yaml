workflows:
  novamind-android:
    name: NovaMind AI Android
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      groups:
        - novamind_keys
      node: 20.11.0
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: npm ci || npm install
      - name: Build web app
        script: npm run build
      - name: Add Android platform
        script: npx cap add android || true
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Build Android AAB
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true

  novamind-ios:
    name: NovaMind AI iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - novamind_keys
      node: 20.11.0
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: studio.novamindai.app
        TEAM_ID: TD66PZ2GJG
        ASC_ISSUER_ID: 5c76d607-4e38-46ed-9f62-0b36fe0625ef
        ASC_KEY_ID: T3UPT4R6G4
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: npm ci || npm install
      - name: Build web app
        script: npm run build
      - name: Add iOS platform
        script: npx cap add ios || true
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Set up code signing
        script: |
          set -ex
          keychain initialize
          # Write key using printf for exact byte control
          mkdir -p ~/private_keys
          printf '%s\n' '-----BEGIN PRIVATE KEY-----' 'MIGTAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBHkwdwIBAQQg1cTpaFjEoHQggLN6' '3ksFRBSBEVA9dzsOg5XzNlMiWCegCgYIKoZIzj0DAQehRANCAASYpXq8hwyGB76/' 'h4480/xVITO/9gd9ebdswiDRQuz6HRrFc8dN0/SrdwCdAIKB51cgl3ZswWflk03e' 'IO8Ga8of' '-----END PRIVATE KEY-----' > ~/private_keys/AuthKey_${ASC_KEY_ID}.p8
          echo "=== Key file debug ==="
          echo "File size: $(wc -c < ~/private_keys/AuthKey_${ASC_KEY_ID}.p8) bytes"
          echo "Line count: $(wc -l < ~/private_keys/AuthKey_${ASC_KEY_ID}.p8) lines"
          echo "MD5: $(md5 -q ~/private_keys/AuthKey_${ASC_KEY_ID}.p8)"
          xxd ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 | head -20
          echo "=== Hex of first and last bytes ==="
          xxd ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 | tail -5
          echo "=== Attempting fetch-signing-files ==="
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --issuer-id "$ASC_ISSUER_ID" \
            --key-id "$ASC_KEY_ID" \
            --private-key "@file:$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            --type IOS_APP_STORE \
            --create
          echo "=== fetch-signing-files SUCCEEDED ==="
          keychain add-certificates
          echo "=== add-certificates SUCCEEDED ==="
          xcode-project use-profiles
          echo "=== use-profiles SUCCEEDED ==="
      - name: Build iOS IPA
        script: |
          set -ex
          cd ios/App
          xcode-project build-ipa \
            --workspace App.xcworkspace \
            --scheme App \
            --archive-flags="-destination 'generic/platform=iOS'"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - ios/App/build/ios/ipa/*.ipa
      - "**/*.ipa"
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $ASC_KEY_ID
        issuer_id: $ASC_ISSUER_ID
        submit_to_testflight: true
