workflows:
  novamind-android:
    name: NovaMind AI Android
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      groups:
        - novamind_keys
      node: 20.11.0
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: npm ci || npm install
      - name: Build web app
        script: npm run build
      - name: Add Android platform
        script: npx cap add android || true
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Build Android AAB
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true

  novamind-ios:
    name: NovaMind AI iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - novamind_keys
        - appstore_credentials
      node: 20.11.0
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: studio.novamindai.app
        APP_STORE_CONNECT_TEAM_ID: TD66PZ2GJG
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: npm ci || npm install
      - name: Build web app
        script: npm run build
      - name: Add iOS platform
        script: npx cap add ios || true
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Set up code signing
        script: |
          keychain initialize
          # Decode base64 private key to file
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 --decode > /tmp/asc_key.p8
          echo "Decoded private key to /tmp/asc_key.p8"
          cat /tmp/asc_key.p8 | head -1
          # Fetch signing files using the decoded key file
          app-store-connect fetch-signing-files $BUNDLE_ID \
            --type IOS_APP_STORE \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID \
            --key-id $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --private-key @/tmp/asc_key.p8 \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace App.xcworkspace \
            --scheme App \
            --archive-flags="-destination 'generic/platform=iOS'"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - ios/App/build/ios/ipa/*.ipa
      - "**/*.ipa"
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
