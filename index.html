<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a0a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <title>NovaMind AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a1a; }
    #splash { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #0a0a1a; z-index: 9999; }
    #splash img { width: 120px; height: 120px; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }
  </style>
</head>
<body>
  <div id="splash"><img src="/icon-512.png" alt="NovaMind AI" /></div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
